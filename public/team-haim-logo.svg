<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Team Haim primary mark: gold "TH" monogram, square, transparent background.
    To swap the brand asset across the app, replace this file (keep the same
    path and filename) and the favicon at public/icon.svg.
    Recommended exports for the launcher / favicon: 32x32, 180x180, 512x512.
  -->
  <defs>
    <linearGradient id="thGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6c876" />
      <stop offset="45%" stop-color="#c9a14a" />
      <stop offset="100%" stop-color="#9a7a2e" />
    </linearGradient>
  </defs>
  <g>
    <!-- H (rear layer): two outer uprights joined by a mid crossbar -->
    <path
      d="M 50 40
         L 92 40
         L 92 116
         L 164 116
         L 164 40
         L 206 40
         L 206 216
         L 164 216
         L 164 150
         L 92 150
         L 92 216
         L 50 216 Z"
      fill="url(#thGold)" />
    <!-- T (front layer): wide angular crossbar with centered stem -->
    <path
      d="M 36 40
         L 220 40
         L 220 82
         L 149 82
         L 149 216
         L 107 216
         L 107 82
         L 36 82 Z"
      fill="url(#thGold)" />
  </g>
</svg>
